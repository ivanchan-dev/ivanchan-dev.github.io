<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Winner Wheel</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #0f172a;
      --border: #e2e8f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
      overflow-x: hidden;
    }

    header {
      margin-bottom: 2rem;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      max-width: 1000px;
      width: 100%;
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      z-index: 10;
    }

    @media (min-width: 768px) {
      .container {
        flex-direction: row;
        align-items: flex-start;
      }
    }

    .input-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    textarea {
      width: 100%;
      height: 200px;
      padding: 1rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: var(--primary);
    }

    button {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    button:hover {
      background-color: var(--primary-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    .wheel-section {
      flex: 1.2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .wheel-container {
      position: relative;
      width: 360px;
      height: 360px;
    }

    .pointer {
      position: absolute;
      top: -15px;
      left: calc(50% - 15px);
      width: 30px;
      height: 30px;
      background: #ef4444;
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      z-index: 10;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
    }

    canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15), 0 0 0 10px #ffffff;
      transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
    }

    #spin-btn {
      margin-top: 1.5rem;
      width: 100%;
      max-width: 200px;
    }

    #spin-btn:disabled {
      background-color: #cbd5e1;
      cursor: not-allowed;
    }

    /* Modal Backdrop Overlay */
    .winner-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 23, 42, 0.25);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    /* Winner Popup Card */
    .modal-content {
      background: white;
      padding: 2.5rem;
      border-radius: 16px;
      text-align: center;
      max-width: 450px;
      width: 90%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 101;
    }

    @keyframes popIn {
      0% {
        transform: scale(0.85);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal-content h2 {
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 0.5rem;
    }

    .modal-content .winner-name {
      font-size: 3rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 1.5rem;
      word-break: break-word;
      line-height: 1.1;
    }

    /* CSS Confetti Styles */
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 99;
      overflow: hidden;
      display: none;
    }

    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 20px;
      background: #ffd300;
      top: -20px;
      opacity: 0.85;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(0) rotate(0deg);
      }

      100% {
        transform: translateY(105vh) rotate(720deg);
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Decision Wheel</h1>
    <p>Enter your choices below, confirm to load the wheel, and spin to win!</p>
  </header>

  <div class="container">
    <div class="input-section">
      <h3>Enter Items (one per line)</h3>
      <textarea id="items-input" placeholder="Choice 1&#10;Choice 2&#10;Choice 3&#10;Choice 4"></textarea>
      <button id="confirm-btn">Confirm List</button>
    </div>

    <div class="wheel-section">
      <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
      </div>
      <button id="spin-btn" disabled>Spin the Wheel!</button>
    </div>
  </div>

  <div class="winner-modal" id="winner-modal">
    <div class="modal-content">
      <h2>Winner Selected!</h2>
      <div class="winner-name" id="winner-text">Winner</div>
      <button onclick="closeModal()">Awesome!</button>
    </div>
  </div>

  <!-- Pure HTML/CSS Confetti Container -->
  <div class="confetti-container" id="confetti-container"></div>

  <script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const itemsInput = document.getElementById('items-input');
    const confirmBtn = document.getElementById('confirm-btn');
    const spinBtn = document.getElementById('spin-btn');
    const winnerModal = document.getElementById('winner-modal');
    const winnerText = document.getElementById('winner-text');
    const confettiContainer = document.getElementById('confetti-container');

    let items = [];
    let isSpinning = false;
    let currentRotation = 0;

    const colors = [
      '#f43f5e', '#ec4899', '#d946ef', '#a855f7',
      '#8b5cf6', '#6366f1', '#3b82f6', '#0ea5e9',
      '#06b6d4', '#14b8a6', '#10b981', '#22c55e'
    ];

    function drawWheel() {
      const numSegments = items.length;
      if (numSegments === 0) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.arc(250, 250, 240, 0, 2 * Math.PI);
        ctx.fillStyle = '#f1f5f9';
        ctx.fill();
        ctx.lineWidth = 5;
        ctx.strokeStyle = '#cbd5e1';
        ctx.stroke();
        ctx.fillStyle = '#94a3b8';
        ctx.font = '20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Add items to begin', 250, 255);
        return;
      }

      const anglePerSegment = (2 * Math.PI) / numSegments;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < numSegments; i++) {
        const startAngle = i * anglePerSegment;
        const endAngle = startAngle + anglePerSegment;

        ctx.beginPath();
        ctx.moveTo(250, 250);
        ctx.arc(250, 250, 240, startAngle, endAngle);
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#ffffff';
        ctx.stroke();

        ctx.save();
        ctx.translate(250, 250);
        ctx.rotate(startAngle + anglePerSegment / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 18px sans-serif';

        let text = items[i];
        if (text.length > 15) text = text.substring(0, 12) + '...';

        ctx.fillText(text, 220, 10);
        ctx.restore();
      }

      ctx.beginPath();
      ctx.arc(250, 250, 25, 0, 2 * Math.PI);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.lineWidth = 4;
      ctx.strokeStyle = '#f1f5f9';
      ctx.stroke();
    }

    drawWheel();

    confirmBtn.addEventListener('click', () => {
      items = itemsInput.value
        .split('\n')
        .map(i => i.trim())
        .filter(i => i.length > 0);

      if (items.length < 2) {
        alert('Please enter at least 2 items to spin the wheel.');
        spinBtn.disabled = true;
        return;
      }

      currentRotation = 0;
      canvas.style.transform = 'rotate(0deg)';

      drawWheel();
      spinBtn.disabled = false;
    });

    spinBtn.addEventListener('click', () => {
      if (isSpinning || items.length < 2) return;

      isSpinning = true;
      spinBtn.disabled = true;

      const segmentAngle = 360 / items.length;
      const randomSpinDegrees = Math.floor(Math.random() * 360) + 1800;
      currentRotation += randomSpinDegrees;

      canvas.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        isSpinning = false;
        spinBtn.disabled = false;

        const finalNormalizedAngle = (360 - (currentRotation % 360) + 270) % 360;
        const winnerIndex = Math.floor(finalNormalizedAngle / segmentAngle) % items.length;
        const winner = items[winnerIndex];

        winnerText.innerText = winner;
        winnerModal.style.display = 'flex';

        // Trigger safe custom CSS/JS confetti
        startConfetti();
      }, 4000);
    });

    // Custom CSS confetti engine (renders seamlessly, no canvas background bugs)
    function startConfetti() {
      confettiContainer.innerHTML = '';
      confettiContainer.style.display = 'block';

      const confettiColors = ['#f43f5e', '#ec4899', '#3b82f6', '#0ea5e9', '#10b981', '#eab308', '#a855f7'];
      const numberOfPieces = 150;

      for (let i = 0; i < numberOfPieces; i++) {
        const piece = document.createElement('div');
        piece.classList.add('confetti-piece');

        // Random horizontal positions, fall speeds, and rotations
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.backgroundColor = confettiColors[Math.floor(Math.random() * confettiColors.length)];

        const sizeWidth = Math.random() * 8 + 6;
        const sizeHeight = Math.random() * 12 + 8;
        piece.style.width = `${sizeWidth}px`;
        piece.style.height = `${sizeHeight}px`;

        const duration = Math.random() * 3 + 2; // 2s to 5s fall duration
        const delay = Math.random() * 2; // delayed enter staggered
        piece.style.animationDuration = `${duration}s`;
        piece.style.animationDelay = `${delay}s`;

        confettiContainer.appendChild(piece);
      }
    }

    function closeModal() {
      winnerModal.style.display = 'none';
      confettiContainer.style.display = 'none';
      confettiContainer.innerHTML = '';
    }
  </script>
</body>

</html>
